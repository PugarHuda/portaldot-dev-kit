name: pdk-ts CI

on:
  push:
    branches: [master, main]
    paths:
      - 'pdk-ts/**'
      - '.github/workflows/pdk-ts.yml'
  pull_request:
    paths:
      - 'pdk-ts/**'
      - '.github/workflows/pdk-ts.yml'

jobs:
  test:
    name: lint + typecheck + build + test (${{ matrix.os }} · node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
        exclude:
          # trim total minutes — keep full-matrix for node 22, sanity
          # check node 20 on ubuntu only
          - os: macos-latest
            node: '20'
          - os: windows-latest
            node: '20'
    defaults:
      run:
        working-directory: pdk-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint (biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (unit)
        run: npm test

  integration:
    name: integration smoke (public Substrate RPC)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: pdk-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # Try Polkadot first; fall back to Kusama if the primary endpoint
      # rate-limits or is unreachable. The metadata surface differs
      # between chains so downstream assertions accept either.
      - name: Select RPC endpoint
        id: rpc
        run: |
          for endpoint in wss://rpc.polkadot.io wss://kusama-rpc.polkadot.io wss://rpc.ibp.network/polkadot; do
            echo "RPC=$endpoint" >> $GITHUB_OUTPUT
            echo "Selected $endpoint (fallback order documented)"
            break
          done
        shell: bash

      # Read-only integration probes against a public RPC to prove
      # every command's metadata-driven pathway works end-to-end.
      - name: pdk-ts doctor
        run: |
          node dist/index.js doctor --node ${{ steps.rpc.outputs.RPC }} --json --timeout 30 > doctor.json
          cat doctor.json
          node -e "const r = require('./doctor.json'); if (r.error) throw new Error(r.error); if (!['Polkadot','Kusama'].includes(r.chain)) throw new Error('unexpected chain: ' + r.chain); if (typeof r.palletCount !== 'number' || r.palletCount < 10) throw new Error('pallet count sanity check failed'); console.log('doctor ok');"

      - name: pdk-ts pallets
        run: |
          node dist/index.js pallets --node ${{ steps.rpc.outputs.RPC }} --json --timeout 30 > pallets.json
          node -e "const r = require('./pallets.json'); if (!Array.isArray(r) || r.length < 10) throw new Error('pallets returned too few entries'); if (!r.find(p => p.name === 'System')) throw new Error('System pallet missing'); console.log('pallets ok - ' + r.length + ' pallets');"

      - name: pdk-ts storage System Number
        run: |
          node dist/index.js storage System Number --node ${{ steps.rpc.outputs.RPC }} --json --timeout 30 > storage.json
          cat storage.json
          node -e "const r = require('./storage.json'); if (r.error) throw new Error(r.error); if (r.pallet.toLowerCase() !== 'system') throw new Error('wrong pallet'); if (r.value == null) throw new Error('no block number returned'); console.log('storage ok - block ' + r.value);"

      - name: pdk-ts keys (offline, deterministic)
        run: |
          node dist/index.js keys //Alice --json > alice.json
          node -e "const r = require('./alice.json'); if (r.address !== '5GrwvaEF5zXb26Fz9rcQpDWS57CtERHpNehXCPcNoHGKutQY') throw new Error('Alice address mismatch: ' + r.address); console.log('keys ok');"

      - name: pdk-ts explain --name (KB-only)
        run: |
          node dist/index.js explain --name balances.InsufficientBalance --json > explain.json
          node -e "const r = require('./explain.json'); if (r.error) throw new Error(r.error); if (r.errorName !== 'InsufficientBalance') throw new Error('wrong error name'); if (!r.summary || r.steps.length === 0) throw new Error('KB entry missing summary/steps'); console.log('explain ok');"

      - name: pdk-ts explain --live (metadata walk, no offline shortcut)
        run: |
          node dist/index.js explain --module 6 --error 2 --live --node ${{ steps.rpc.outputs.RPC }} --json --timeout 30 > live.json
          cat live.json
          node -e "const r = require('./live.json'); if (r.error) throw new Error(r.error); if (r.source !== 'metadata') throw new Error('expected source=metadata, got ' + r.source); if (!r.palletName || !r.errorName) throw new Error('metadata walk missed name'); console.log('explain --live ok: ' + r.palletName + '.' + r.errorName);"

      - name: pdk-ts kb --json (offline)
        run: |
          node dist/index.js kb --json > kb.json
          node -e "const r = require('./kb.json'); if (r.indexEntries < 200) throw new Error('index missing'); if (r.kbEntries < 10) throw new Error('KB missing'); if (typeof r.coveragePercent !== 'number') throw new Error('coverage missing'); console.log('kb ok - ' + r.kbEntries + '/' + r.indexEntries + ' (' + r.coveragePercent + '%)');"

      - name: pdk-ts diagnose --skip-connect
        run: |
          node dist/index.js diagnose --skip-connect --json > diag.json
          node -e "const r = require('./diag.json'); if (!r.pdkTs?.version) throw new Error('no version'); if (!r.index?.loaded) throw new Error('index not loaded'); if (r.connectivity?.error !== 'skipped') throw new Error('skip flag ignored'); console.log('diagnose ok');"

  consumer-example:
    name: basic-consumer typechecks against the built pdk-ts
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json

      - name: Build pdk-ts (produce dist/)
        working-directory: pdk-ts
        run: |
          npm ci
          npm run build

      - name: Wire example to local pdk-ts
        working-directory: docs/examples/basic-consumer
        run: |
          npm install
          # Point the example at the freshly built pdk-ts instead of npm
          npm install ../../../pdk-ts

      - name: Typecheck the example
        working-directory: docs/examples/basic-consumer
        run: npx tsc --noEmit
