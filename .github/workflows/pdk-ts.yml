name: pdk-ts CI

on:
  push:
    branches: [master, main]
    paths:
      - 'pdk-ts/**'
      - '.github/workflows/pdk-ts.yml'
  pull_request:
    paths:
      - 'pdk-ts/**'
      - '.github/workflows/pdk-ts.yml'

jobs:
  test:
    name: typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pdk-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
