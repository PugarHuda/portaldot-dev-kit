name: Security

on:
  push:
    branches: [master, main]
  pull_request:
  schedule:
    # Weekly Monday 03:00 UTC — catches upstream disclosures without
    # needing every push to burn minutes on a full scan.
    - cron: '0 3 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json

      - name: Install pdk-ts deps
        working-directory: pdk-ts
        run: npm ci

      - name: Generate SBOM (npm)
        working-directory: pdk-ts
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file ../sbom-pdk-ts.cdx.json
          echo "--- SBOM summary ---"
          node -e "
            const s = require('../sbom-pdk-ts.cdx.json');
            const n = s.components?.length ?? 0;
            console.log('components:', n);
            // Gate: if the SBOM tool produced nothing, silently green
            // was worse than red. pdk-ts pulls @polkadot/api which has
            // ~50 transitive deps, so 30 is a very conservative floor.
            if (n < 30) {
              console.error('SBOM component count', n, 'is under the floor of 30 — cyclonedx tool likely regressed');
              process.exit(1);
            }
          "

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pdk-ts
          path: sbom-pdk-ts.cdx.json
          retention-days: 30
