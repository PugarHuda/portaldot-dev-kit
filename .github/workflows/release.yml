name: release

# Publishes pdk to PyPI when a version tag (v*) is pushed.
#
# Auth: uses an API token stored in the repo as the PYPI_API_TOKEN secret.
# Token-based auth was chosen over Trusted Publishing (OIDC) because the
# repo was renamed mid-hackathon and PyPI's Trusted Publisher records pin
# to a specific owner+repo pair — every rename forces a manual reconfig
# on pypi.org, which doesn't survive automation. Token auth is stable
# across renames. Rotate the token periodically (Settings → Secrets).
#
# manual dispatch: lets a maintainer re-run a failed release without
# pushing a new tag (useful if PyPI rate-limits or a network blip
# kills an upload partway through).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
