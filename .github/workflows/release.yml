name: release

# Publishes pdk to PyPI when a version tag (v*) is pushed.
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup: on PyPI, add a Trusted Publisher for project "portaldot-pdk"
# pointing at this repo + workflow (release.yml) + environment "pypi".
# See CONTRIBUTING.md → "Cutting a release".

on:
  push:
    tags: ["v*"]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
