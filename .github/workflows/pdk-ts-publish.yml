name: pdk-ts publish

# Publishes pdk-ts to npm on tags of the form `pdk-ts-vX.Y.Z` or
# `pdk-ts-vX.Y.Z-alpha.N`. Manual dispatch also supported.
#
# Prerequisites (one-time, in the repo Settings → Secrets):
#   NPM_TOKEN — an automation token with publish scope on the
#               `portaldot-pdk-ts` package.

on:
  push:
    tags:
      - 'pdk-ts-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # `npm publish --provenance` requires GitHub OIDC to attest the
    # build. Without id-token: write, the publish step fails at push
    # time with "provenance requires id-token: write". contents: read
    # is the tightest default that still lets checkout run.
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: pdk-ts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: pdk-ts/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Choose dist-tag from the version in package.json — prereleases
       # go to `alpha`, stable versions go to `latest`. Prevents `npm
       # install portaldot-pdk-ts` from resolving a prerelease as latest.
      - name: Resolve dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-alpha.* ]] || [[ "$VERSION" == *-beta.* ]] || [[ "$VERSION" == *-rc.* ]]; then
            echo "DIST_TAG=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "DIST_TAG=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "resolved version=$VERSION → dist-tag=$(cat $GITHUB_OUTPUT | grep DIST_TAG)"
        shell: bash

      - name: Publish (dry run on non-tag runs)
        run: npm publish --access public --provenance --tag ${{ steps.tag.outputs.DIST_TAG }} --dry-run
        if: github.event_name == 'workflow_dispatch'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        run: npm publish --access public --provenance --tag ${{ steps.tag.outputs.DIST_TAG }}
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
