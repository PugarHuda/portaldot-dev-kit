name: Docker (pdk-ts image)

# Build the pdk-ts Docker image on every push to master + tag pushes,
# and publish to GitHub Container Registry (ghcr.io) on tags.
# Runs the built image against a smoke test to confirm the CLI works.

on:
  push:
    branches: [master, main]
    paths:
      - 'pdk-ts/**'
      - 'pdk/data/**'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
    tags: ['pdk-ts-v*']
  # Run on ALL PRs, not just Dockerfile-only ones — a change in
  # pdk-ts sources or the shared KB can break the image smoke tests
  # too, and a merged-then-red main is worse than a slow PR check.
  pull_request:
    paths:
      - 'pdk-ts/**'
      - 'pdk/data/**'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  # NOT cancel-in-progress on tag builds — killing a mid-flight publish
  # is worse than double-billing. Cancel only branch/PR runs.
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: build + smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/portaldot-pdk-ts
          # `latest` explicitly follows master, not "whatever GitHub
          # thinks the default branch is" — survives repo rename /
          # default-branch swap without silently mistagging.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=match,pattern=pdk-ts-v(.*),group=1
          # image.version follows the semantic tag when we build one, so
          # `docker inspect ghcr.io/.../pdk-ts` reports the real version
          # instead of the OCI default "unknown".
          labels: |
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build (load into local Docker for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pdk-ts:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: |
          docker run --rm pdk-ts:test version --json > version.json
          cat version.json
          node -e "const r = require('./version.json'); if (!r.version.startsWith('0.2')) throw new Error('bad version'); console.log('version ok');"
          docker run --rm pdk-ts:test kb --json > kb.json
          node -e "
            const r = require('./kb.json');
            if (r.indexEntries < 200) throw new Error('index missing in image');
            if (r.indexFingerprint?.specName !== 'portaldot') throw new Error('sidecar not copied — image has stale fingerprint: ' + JSON.stringify(r.indexFingerprint));
            if (r.driftDetected) throw new Error('image ships drifted KB: ' + r.driftReason);
            console.log('kb+index ok — fingerprint', r.indexFingerprint.specName + '-' + r.indexFingerprint.specVersion);
          "
          docker run --rm pdk-ts:test explain --module 6 --error 2 --json > explain.json
          node -e "const r = require('./explain.json'); if (r.errorName !== 'InsufficientBalance') throw new Error('explain wrong'); console.log('explain ok');"

      - name: Non-root user check
        run: |
          # If the Dockerfile's `USER pdk` regresses, catch it here — the
          # entrypoint is `node dist/index.js` so we can't `id -u` via the
          # normal path. Override the entrypoint to `id`.
          UID_IN_IMAGE=$(docker run --rm --entrypoint id pdk-ts:test -u)
          echo "container UID: $UID_IN_IMAGE"
          if [ "$UID_IN_IMAGE" = "0" ]; then
            echo "❌ container runs as root — the Dockerfile USER directive regressed"
            exit 1
          fi
          echo "✅ non-root confirmed"

      - name: Set up QEMU (for multi-arch tag builds)
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        uses: docker/setup-qemu-action@v3

      - name: Push to GHCR (tag builds — multi-arch)
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Serve both x86 servers and Apple Silicon dev machines without
          # forcing users into slow rosetta / qemu emulation.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
