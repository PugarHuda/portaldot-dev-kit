name: Docker (pdk-ts image)

# Build the pdk-ts Docker image on every push to master + tag pushes,
# and publish to GitHub Container Registry (ghcr.io) on tags.
# Runs the built image against a smoke test to confirm the CLI works.

on:
  push:
    branches: [master, main]
    paths:
      - 'pdk-ts/**'
      - 'pdk/data/**'
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
    tags: ['pdk-ts-v*']
  pull_request:
    paths:
      - 'Dockerfile'
      - '.github/workflows/docker.yml'
  workflow_dispatch:

jobs:
  build:
    name: build + smoke-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/portaldot-pdk-ts
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=pdk-ts-v(.*),group=1

      - name: Build (load into local Docker for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: pdk-ts:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test the image
        run: |
          docker run --rm pdk-ts:test version --json > version.json
          cat version.json
          node -e "const r = require('./version.json'); if (!r.version.startsWith('0.2')) throw new Error('bad version'); console.log('version ok');"
          docker run --rm pdk-ts:test kb --json > kb.json
          node -e "const r = require('./kb.json'); if (r.indexEntries < 200) throw new Error('index missing in image'); console.log('kb+index ok');"
          docker run --rm pdk-ts:test explain --module 6 --error 2 --json > explain.json
          node -e "const r = require('./explain.json'); if (r.errorName !== 'InsufficientBalance') throw new Error('explain wrong'); console.log('explain ok');"

      - name: Push to GHCR (tag builds only)
        if: startsWith(github.ref, 'refs/tags/pdk-ts-v')
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
