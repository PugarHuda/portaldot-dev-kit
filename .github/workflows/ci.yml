name: tests

on:
  push:
  pull_request:

# Cancel superseded runs — a second push on the same branch kills the
# in-flight run instead of racing it. Saves minutes on rapid-fire pushes.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests
        run: pytest tests/ -q

      - name: Syntax-check extract_index.py (offline)
        # extract_index.py wants a live node so we can't exec it here,
        # but py_compile catches syntax + import errors introduced by
        # PRs that touch the extractor.
        run: python -m py_compile extract_index.py
