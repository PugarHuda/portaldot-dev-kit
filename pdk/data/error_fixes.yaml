# FailLens knowledge base — Portaldot/Substrate pallet errors -> human fixes.
#
# SCHEMA VERSION: 1
#   Entry shape:
#     "<pallet_lowercased>.<ErrorName>":
#       summary: str        # ~1 sentence, 6th-grade reading level
#       steps:              # ordered list, at least one item
#         - "..."
#   The pallet component is always lowercased; the error component keeps
#   PascalCase to match the runtime metadata. Both pdk (Python) and
#   pdk-ts (TypeScript) load this file directly and use the key form
#   above for case-insensitive lookups.
#   Schema changes are semver-versioned — bump this number in a
#   dedicated commit, never mixed with content changes.
#
# Every key below is VERIFIED against the live Portaldot runtime metadata
# (portaldot-1002, 202 pallet errors). Key format: "<pallet>.<ErrorName>" with
# the pallet lowercased. "dispatch.*" keys are top-level DispatchError variants
# (not module errors) — FailLens still resolves them by error name.

# --- balances ---------------------------------------------------------------
balances.InsufficientBalance:
  summary: "You tried to transfer more POT than the sending account holds."
  steps:
    - "Check the sender balance via the Portaldot explorer (portalscan.portaldot.io) or `pdk doctor`."
    - "Lower the transfer amount, or fund the account first (dev accounts are pre-funded on a --dev chain)."

balances.ExistentialDeposit:
  summary: "The transfer would leave an account below the Existential Deposit, so it was rejected."
  steps:
    - "Leave at least the Existential Deposit in both the sender and receiver."
    - "Or move the whole balance with `transfer` (allow death) instead of `transfer_keep_alive`."

balances.KeepAlive:
  summary: "The transfer would kill the sender account, but a keep-alive call was used."
  steps:
    - "Reduce the amount so the sender keeps at least the Existential Deposit."
    - "Use `transfer` if you intend to empty the account."

balances.LiquidityRestrictions:
  summary: "The funds are locked or frozen (e.g. by staking or vesting) and cannot be moved."
  steps:
    - "Unlock the funds first — unbond from staking or wait for vesting to release."

balances.DeadAccount:
  summary: "The target account does not exist on-chain (it was reaped below the Existential Deposit)."
  steps:
    - "Send at least the Existential Deposit to create the account before further calls."

balances.VestingBalance:
  summary: "The balance is still locked by a vesting schedule and cannot be spent yet."
  steps:
    - "Wait for the vesting schedule to release, or call `vesting.vest` to unlock vested funds."

# --- assets -----------------------------------------------------------------
assets.BalanceLow:
  summary: "The account does not hold enough of this asset for the operation."
  steps:
    - "Mint or transfer more of the asset to the account before retrying."

assets.NoPermission:
  summary: "The signer is not the issuer/admin/freezer of this asset."
  steps:
    - "Sign with the asset's admin account, or transfer the relevant role first."

assets.Unknown:
  summary: "The referenced asset id does not exist."
  steps:
    - "Create the asset with `assets.create`, or correct the asset id."

assets.Frozen:
  summary: "The asset or the account's holding of it is frozen."
  steps:
    - "Thaw the asset/account with the freezer role before transferring."

assets.WouldDie:
  summary: "The operation would drop the account's asset balance below the minimum, killing it."
  steps:
    - "Leave at least the asset's minimum balance, or transfer the whole holding at once."

assets.Unapproved:
  summary: "No approved allowance exists for this delegated transfer."
  steps:
    - "Call `assets.approve_transfer` from the owner before a `transfer_approved`."

# --- contracts --------------------------------------------------------------
contracts.ContractNotFound:
  summary: "No contract exists at the supplied address."
  steps:
    - "Verify the address; ensure the contract was instantiated, not merely uploaded."

contracts.ContractTrapped:
  summary: "The contract panicked or hit a trap during execution."
  steps:
    - "Check the contract logic and the message arguments; inspect debug output."

contracts.CodeNotFound:
  summary: "No uploaded code matches the given code hash."
  steps:
    - "Upload the contract Wasm first, then instantiate with the resulting code hash."

contracts.CodeTooLarge:
  summary: "The uploaded contract Wasm exceeds the runtime size limit."
  steps:
    - "Build with `--release` and optimise the Wasm (e.g. wasm-opt) to shrink it."

contracts.OutOfGas:
  summary: "Execution ran out of the supplied gas (weight) budget."
  steps:
    - "Increase `gasLimit`. A dry-run call returns a realistic estimate to use."

contracts.StorageExhausted:
  summary: "The contract has no storage budget left for this operation."
  steps:
    - "Fund the contract account so it can pay for additional storage."

contracts.MaxCallDepthReached:
  summary: "Cross-contract calls nested deeper than the runtime call-depth limit."
  steps:
    - "Flatten the call graph so contracts do not call each other too deeply."

# --- identity ---------------------------------------------------------------
identity.NotFound:
  summary: "No identity is registered for this account."
  steps:
    - "Register an identity with `identity.set_identity` before reading or judging it."

identity.TooManyRegistrars:
  summary: "The registrar set is already at its maximum size."
  steps:
    - "No client-side fix — the runtime caps the number of registrars."

# --- multisig ---------------------------------------------------------------
multisig.NotFound:
  summary: "No matching multisig operation was found to approve or cancel."
  steps:
    - "Confirm the call hash, timepoint, and signatory set match the original proposal exactly."

multisig.NotOwner:
  summary: "Only the account that opened the multisig call may cancel it."
  steps:
    - "Cancel from the original creator account, or approve instead of cancelling."

# --- proxy ------------------------------------------------------------------
proxy.NotProxy:
  summary: "The signer is not registered as a proxy for the target account."
  steps:
    - "Add the proxy relationship with `proxy.add_proxy` from the target account first."

# --- staking ----------------------------------------------------------------
staking.InsufficientBond:
  summary: "The bonded amount is below the minimum required to stake."
  steps:
    - "Bond more POT so the stake meets the minimum bond threshold."

staking.NotController:
  summary: "The signing account is not the controller for this stash."
  steps:
    - "Sign with the stash's controller account for staking operations."

# --- scheduler --------------------------------------------------------------
scheduler.TargetBlockNumberInPast:
  summary: "The scheduled call's target block is already in the past."
  steps:
    - "Schedule for a block number greater than the current chain head."

# --- dispatch-level (non-module DispatchError variants) ---------------------
dispatch.BadOrigin:
  summary: "The call requires a different origin (e.g. Root or a specific owner) than the signer used."
  steps:
    - "Sign with an account authorised for this call."
    - "Root-only calls must be routed through the `sudo` pallet on a dev node."

dispatch.CannotLookup:
  summary: "An address lookup failed — e.g. an account index that does not resolve to an account."
  steps:
    - "Pass a full account address instead of an index, or check the index exists."

# --- dev-loop coverage pass (alpha.6 QA): high-hit errors on a --dev node ---

sudo.RequireSudo:
  summary: "The call needs the Sudo (Root) key, but it was signed by another account or not wrapped in a sudo call."
  steps:
    - "Wrap the inner call in `sudo.sudo(call)` — Root-only calls must go through the Sudo pallet."
    - "Sign with the current sudo key (it is //Alice on a --dev chain). Confirm it via `pdk storage Sudo Key`."

staking.AlreadyBonded:
  summary: "This stash is already bonded, so you cannot bond it again."
  steps:
    - "Add to the existing bond with `staking.bondExtra` instead of `staking.bond`."
    - "To start over, `staking.unbond` then `staking.withdrawUnbonded` first."

staking.EmptyTargets:
  summary: "You called `staking.nominate` with an empty validator list."
  steps:
    - "Pass at least one validator address to nominate."
    - "Find candidates via `staking.validators` before nominating."

staking.NotStash:
  summary: "The signing account is not the stash account this call expects."
  steps:
    - "Sign with the stash account (the one that holds the bonded funds), not the controller."

assets.BalanceZero:
  summary: "The account holds zero of this asset, so there is nothing for the operation to act on."
  steps:
    - "Mint or transfer some of the asset to the account first (`assets.mint` / `assets.transfer`)."

assets.InUse:
  summary: "The asset ID is already taken, so it cannot be created again."
  steps:
    - "Pick a different, unused asset ID for `assets.create`."
    - "Inspect existing assets to find a free ID before creating."

assets.NoProvider:
  summary: "The target account has no provider reference, so it cannot hold a non-zero balance of this (non-sufficient) asset yet."
  steps:
    - "Give the account a provider first — fund it with a small POT transfer so it exists on-chain, then retry."

balances.ExistingVestingSchedule:
  summary: "A vesting schedule already exists for this account, so another cannot be added."
  steps:
    - "Target a different account, or wait for the existing schedule to release before adding one."

balances.TooManyReserves:
  summary: "The account already holds the maximum number of named reserves (MaxReserves)."
  steps:
    - "Release an existing reserve before creating a new one."
